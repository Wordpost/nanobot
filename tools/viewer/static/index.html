<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobot — Session Viewer</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/config-editor.css">
    <link rel="stylesheet" href="/static/config-editor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Nanobot</span>
            </div>
            <span class="session-count" id="session-count">0</span>
        </div>

        <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/>
                <line x1="11" y1="11" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="text" id="search-input" placeholder="Поиск сессий..." autocomplete="off">
        </div>

        <div class="channel-filters" id="channel-filters"></div>

        <div class="session-list" id="session-list">
            <div class="loading-state">
                <div class="spinner"></div>
                <span>Загрузка сессий...</span>
            </div>
        </div>

        <!-- ── Sidebar Toolbar ───────────────────── -->
        <div class="sidebar-toolbar">
            <div class="toolbar-group">
                <span class="toolbar-label">Monitoring</span>
                <div class="toolbar-buttons">
                    <button class="toolbar-btn" id="logs-toggle" title="Docker Logs">
                        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                            <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="4" y1="6" x2="12" y2="6" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
                            <line x1="4" y1="8.5" x2="9" y2="8.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
                            <line x1="4" y1="10.5" x2="10.5" y2="10.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
                        </svg>
                        <span>Logs</span>
                    </button>
                    <button class="toolbar-btn" id="subagent-toggle" title="Subagent Executions">
                        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                            <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="4" cy="12" r="2" stroke="currentColor" stroke-width="1.2"/>
                            <circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="1.2"/>
                            <line x1="8" y1="8" x2="4" y2="10" stroke="currentColor" stroke-width="1" opacity="0.6"/>
                            <line x1="8" y1="8" x2="12" y2="10" stroke="currentColor" stroke-width="1" opacity="0.6"/>
                        </svg>
                        <span>Subagents</span>
                    </button>
                </div>
            </div>
            <div class="toolbar-group">
                <span class="toolbar-label">System</span>
                <div class="toolbar-buttons">
                    <button class="toolbar-btn" id="deploy-toggle" title="Deploy Update">
                        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                            <path d="M8 1V6M8 1L5.5 3.5M8 1L10.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M3 8V12C3 13.1046 3.89543 14 5 14H11C12.1046 14 13 13.1046 13 12V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span>Update</span>
                    </button>
                    <button class="toolbar-btn" id="restart-toggle" title="Restart Container">
                        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                            <path d="M1 8C1 11.866 4.13401 15 8 15C11.866 15 15 11.866 15 8C15 4.13401 11.866 1 8 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M12 1L8.5 4.5M12 1V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Restart</span>
                    </button>
                    <button class="toolbar-btn" id="open-config-btn" title="System Configuration">
                        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                            <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/>
                            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.4 1.4M11.55 11.55l1.4 1.4M3.05 12.95l1.4-1.4M11.55 4.45l1.4-1.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        </svg>
                        <span>Config</span>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <main class="main" id="main">
        <div class="empty-state" id="empty-state">
            <div class="empty-icon">SCAN_MODE</div>
            <h2 style="text-transform: uppercase; letter-spacing: 2px;">No Active Session</h2>
            <p>Select a history node from the sequence list to begin forensic analysis</p>
        </div>

        <div class="chat-view hidden" id="chat-view">
            <header class="chat-header" id="chat-header">
                <div class="chat-header-info">
                    <h2 class="chat-title" id="chat-title"></h2>
                    <div class="chat-meta" id="chat-meta"></div>
                </div>
                <div class="chat-actions">
                    <span class="message-count-badge" id="message-count-badge"></span>
                    <button class="btn-icon" id="btn-refresh-chat" title="Обновить">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <polyline points="10,1 13.5,2.5 12,5.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </header>
            <div class="chat-messages" id="chat-messages"></div>
        </div>
    </main>

    <!-- Docker Logs Panel -->
    <div class="logs-panel hidden" id="logs-panel">
        <div class="logs-header">
            <h3>Docker Logs <span id="live-badge" class="live-badge hidden">● LIVE</span></h3>
            <div class="logs-actions">
                <button class="btn-icon panel-expand-btn" data-panel="logs-panel" title="Развернуть">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M3 10V13H6M13 6V3H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="btn-icon btn-close-logs" id="btn-close-logs">✕</button>
            </div>
        </div>
        <div class="logs-content" id="logs-content"></div>
    </div>

    <!-- Deploy Process Panel -->
    <div class="logs-panel deploy-panel-theme hidden" id="deploy-panel">
        <div class="logs-header">
            <h3>System Update <span id="deploy-badge" class="live-badge deploy-live-badge hidden">● RUNNING</span></h3>
            <div class="logs-actions">
                <button class="btn-icon panel-expand-btn" data-panel="deploy-panel" title="Развернуть">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M3 10V13H6M13 6V3H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="btn-icon btn-close-logs" id="btn-close-deploy">✕</button>
            </div>
        </div>
        <div class="logs-content" id="deploy-content"></div>
    </div>

    <!-- Subagent Execution Panel -->
    <div class="logs-panel subagent-panel-theme hidden" id="subagent-panel">
        <div class="logs-header">
            <h3>🤖 Subagent Executions <span id="subagent-badge" class="live-badge hidden">● LIVE</span></h3>
            <div class="logs-actions">
                <button class="btn-icon panel-expand-btn" data-panel="subagent-panel" title="Развернуть">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M3 10V13H6M13 6V3H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="btn-icon btn-close-logs" id="btn-close-subagent">✕</button>
            </div>
        </div>
        <div class="subagent-panel-layout">
            <div class="subagent-panel-sidebar" id="subagent-list">
                <div class="subagent-panel-empty">Loading...</div>
            </div>
            <div class="subagent-panel-detail" id="subagent-detail">
                <div class="subagent-panel-empty">Select a subagent to view execution log</div>
            </div>
        </div>
    </div>

    <!-- Config Editor Modal -->
    <div class="config-modal" id="config-modal">
        <div class="config-header">
            <h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12A10 10 0 1 0 12 22a10 10 0 0 0 10-10Z"></path>
                    <path d="M17 12h-4"></path>
                    <path d="M13 8h-4"></path>
                    <path d="M9 16H8"></path>
                </svg>
                System Configuration
            </h2>
            <div class="config-actions">
                <button class="config-btn cancel" id="config-cancel-btn">Cancel</button>
                <button class="config-btn save" id="config-save-btn">Save Configuration</button>
            </div>
        </div>
        <div class="config-layout">
            <div class="config-nav" id="config-nav">
                <!-- Auto-populated via JS -->
            </div>
            <div class="config-content" id="config-content">
                <!-- Auto-populated via JS -->
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/main.js?v=2.7.0"></script>
</body>
</html>
